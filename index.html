        <main class="main-content">    
            <!-- SECCIÓN HOME - CON POSTS INTEGRADOS -->
            <section id="home-section" class="home-section">
                
                <!-- VISTA DE LISTA DE POSTS -->
                <div id="posts-list-view" class="posts-list-view">
                    <div class="section-header">
                        <h2 class="section-title">Home</h2>
                        <div class="search-container">
                            <input 
                                type="text" 
                                id="search-input" 
                                class="search-input" 
                                placeholder="Buscar posts..." 
                                aria-label="Buscar posts">
                            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </div>
                    </div>
                    <div id="posts-container" class="posts-container"></div>

                    <!-- PAGINACIÓN -->
                    <div class="modern-pagination">
                        <button id="prev-pagination-btn" class="pagination-arrow" aria-label="Página anterior">
                            <span class="arrow">←</span>
                        </button>
                        <div id="pagination-numbers" class="pagination-numbers"></div>
                        <button id="next-pagination-btn" class="pagination-arrow" aria-label="Página siguiente">
                            <span class="arrow">→</span>
                        </button>
                    </div>
                </div>

                <!-- VISTA INDIVIDUAL DE POST -->
                <div id="post-detail-view" class="post-detail-view hidden">
                    <button id="back-to-posts-btn" class="back-button">Volver</button>
                    <article id="post-article" class="post-article">
                        <header class="post-header">
                            <h1 class="post-title-detail"></h1>
                            <div class="post-meta-detail">
                                <time class="post-date-detail"></time>
                                <span class="post-category-badge"></span>
                            </div>
                        </header>
                        <img id="post-featured-image" class="post-featured-image" alt="featured image">
                        <div id="post-content" class="post-markdown-content"></div>
                    </article>

                    <!-- PAGINACIÓN POST INDIVIDUAL -->
                    <div class="post-detail-pagination">
                        <button id="post-prev-btn" class="post-nav-btn" aria-label="Post anterior">
                            ← Post anterior
                        </button>
                        <button id="post-next-btn" class="post-nav-btn" aria-label="Siguiente post">
                            Siguiente post →
                        </button>
                    </div>
                </div>

            </section>

            <!-- SECCIÓN PROYECTOS -->
            <section id="projects-section" class="projects-section hidden">
                <div class="section-header">
                    <h2 class="section-title">Projects</h2>
                    <div class="search-container">
                        <input 
                            type="text" 
                            id="projects-search-input" 
                            class="search-input" 
                            placeholder="Buscar proyectos..." 
                            aria-label="Buscar proyectos">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>
                </div>

                <div id="projects-container" class="projects-container"></div>

                <!-- PAGINACIÓN PROYECTOS -->
                <div class="modern-pagination" id="projects-pagination">
                    <button id="projects-prev-pagination-btn" class="pagination-arrow" aria-label="Página anterior">
                        <span class="arrow">←</span>
                    </button>
                    <div id="projects-pagination-numbers" class="pagination-numbers"></div>
                    <button id="projects-next-pagination-btn" class="pagination-arrow" aria-label="Página siguiente">
                        <span class="arrow">→</span>
                    </button>
                </div>
            </section>

            <!-- SECCIÓN ABOUT -->
            <section id="about-section" class="about-section hidden">
                <h2 class="section-title">About</h2>
                <div class="about-content">
                    <p>About content will go here...</p>
                </div>
            </section>
        </main>
    </div>
